services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_MULTIPLE_DATABASES: "booking_db,property_db,user_db,sync_db,finance_db"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin" ]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: user-service
    container_name: user-service
    environment:
      SERVER_PORT: "8083"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/user_db?sslmode=disable"
      SPRING_DATASOURCE_USERNAME: "admin"
      SPRING_DATASOURCE_PASSWORD: "password"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"

  property-service:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: property-service
    container_name: property-service
    environment:
      SERVER_PORT: "8082"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/property_db"
      SPRING_DATASOURCE_USERNAME: "admin"
      SPRING_DATASOURCE_PASSWORD: "password"
      SPRING_RABBITMQ_HOST: "rabbitmq"
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: "guest"
      SPRING_RABBITMQ_PASSWORD: "guest"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8082:8082"

  booking-service:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: booking-service
    container_name: booking-service
    environment:
      SERVER_PORT: "8081"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/booking_db"
      SPRING_DATASOURCE_USERNAME: "admin"
      SPRING_DATASOURCE_PASSWORD: "password"
      SPRING_RABBITMQ_HOST: "rabbitmq"
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: "guest"
      SPRING_RABBITMQ_PASSWORD: "guest"
      PROPERTY_SERVICE_URL: "http://property-service:8082"
      USER_SERVICE_URL: "http://user-service:8083"
      FINANCE_SERVICE_URL: "http://finance-service:8085"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_started
      property-service:
        condition: service_started
    ports:
      - "8081:8081"

  sync-service:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: sync-service
    container_name: sync-service
    environment:
      SERVER_PORT: "8084"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/sync_db"
      SPRING_DATASOURCE_USERNAME: "admin"
      SPRING_DATASOURCE_PASSWORD: "password"
      SPRING_RABBITMQ_HOST: "rabbitmq"
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: "guest"
      SPRING_RABBITMQ_PASSWORD: "guest"
      USER_SERVICE_URL: "http://user-service:8083"
      BOOKING_SERVICE_URL: "http://booking-service:8081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_started
      booking-service:
        condition: service_started
    ports:
      - "8084:8084"

  finance-service:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: finance-service
    container_name: finance-service
    environment:
      SERVER_PORT: "8085"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/finance_db"
      SPRING_DATASOURCE_USERNAME: "admin"
      SPRING_DATASOURCE_PASSWORD: "password"
      BOOKING_SERVICE_URL: "http://booking-service:8081"
    depends_on:
      postgres:
        condition: service_healthy
      booking-service:
        condition: service_started
    ports:
      - "8085:8085"

  api-gateway:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: api-gateway
    container_name: api-gateway
    environment:
      SERVER_PORT: "8080"
      USER_SERVICE_URL: "http://user-service:8083"
      PROPERTY_SERVICE_URL: "http://property-service:8082"
      BOOKING_SERVICE_URL: "http://booking-service:8081"
      SYNC_SERVICE_URL: "http://sync-service:8084"
      FINANCE_SERVICE_URL: "http://finance-service:8085"
    depends_on:
      user-service:
        condition: service_started
      property-service:
        condition: service_started
      booking-service:
        condition: service_started
      sync-service:
        condition: service_started
      finance-service:
        condition: service_started
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8080/api"
        NEXT_PUBLIC_IDP: "jwt"
    container_name: frontend
    environment:
      NODE_ENV: "production"
      NEXT_PUBLIC_IDP: "jwt"
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  postgres_data:
