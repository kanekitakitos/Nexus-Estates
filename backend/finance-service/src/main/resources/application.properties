spring.application.name=finance-service
server.port=${SERVER_PORT:8085}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finance_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=${SPRING_FLYWAY_LOCATIONS:classpath:db/migration}

booking.service.url=${BOOKING_SERVICE_URL:http://localhost:8081}

stripe.secret.key=${STRIPE_SECRET_KEY:whsec_your_secret_here}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:whsec_your_publish_secret_here}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret_here}

moloni.base-url=${MOLONI_BASE_URL:https://api.moloni.pt/v1}
moloni.api-key=${MOLONI_API_KEY:}
moloni.access-token=${MOLONI_ACCESS_TOKEN:${moloni.api-key:}}
moloni.company-id=${MOLONI_COMPANY_ID:}
moloni.document-set-id=${MOLONI_DOCUMENT_SET_ID:}
moloni.customer-id=${MOLONI_CUSTOMER_ID:}
moloni.payment-method-id=${MOLONI_PAYMENT_METHOD_ID:}
moloni.product-id=${MOLONI_PRODUCT_ID:}

invoicing.provider=${INVOICING_PROVIDER:MOCK}
mock.invoice.prefix=${MOCK_INVOICE_PREFIX:FT}
mock.invoice.base-url=${MOCK_INVOICE_BASE_URL:https://cdn.nexus-estates.local/mock}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.api-docs.path=/v3/api-docs
