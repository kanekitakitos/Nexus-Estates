name: Frontend E2E (API)

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch:

jobs:
  e2e-api:
    name: Run Frontend API E2E Tests
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      E2E_API_BASE_URL: "http://localhost:8080/api"

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: 'maven'

      - name: Start infrastructure (Postgres + RabbitMQ)
        run: docker compose -f infrastructure/docker-compose.yml up -d

      - name: Build backend services (skip tests)
        working-directory: ./backend
        run: mvn -B -pl api-gateway,booking-service,property-service,user-service -am package -DskipTests

      - name: Start backend services
        run: |
          nohup java -jar backend/user-service/target/user-service-1.0.0.jar > user-service.log 2>&1 &
          nohup java -jar backend/property-service/target/property-service-1.0.0.jar > property-service.log 2>&1 &
          nohup java -jar backend/booking-service/target/booking-service-1.0.0.jar > booking-service.log 2>&1 &
          nohup java -jar backend/api-gateway/target/api-gateway-1.0.0.jar > api-gateway.log 2>&1 &

      - name: Wait for API Gateway
        run: |
          for i in {1..60}; do
            code="$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/v3/api-docs || true)"
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "API Gateway not ready"
          exit 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install --frozen-lockfile

      - name: Run Playwright API tests
        working-directory: ./frontend
        run: bun run test:e2e -- e2e/api

      - name: Dump backend logs (only on failure)
        if: failure()
        run: |
          echo "===== api-gateway.log ====="
          tail -n 400 api-gateway.log || true
          echo "===== user-service.log ====="
          tail -n 400 user-service.log || true
          echo "===== property-service.log ====="
          tail -n 400 property-service.log || true
          echo "===== booking-service.log ====="
          tail -n 400 booking-service.log || true
